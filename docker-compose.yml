services:
  agent:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./agent:/workspace/agent:ro    # Your agent config (read-only)
      - ./sessions:/workspace/sessions  # Persistent session data
    environment:
      # Auth (pick one):
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # Or OAuth:
      - CLAUDE_OAUTH_TOKEN=${CLAUDE_OAUTH_TOKEN:-}
      - CLAUDE_REFRESH_TOKEN=${CLAUDE_REFRESH_TOKEN:-}
      # Config:
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-20250514}
      - MAX_TURNS=${MAX_TURNS:-15}
      - IDLE_TIMEOUT_MS=${IDLE_TIMEOUT_MS:-900000}
      # MCP servers (JSON):
      - MCP_CONFIG=${MCP_CONFIG:-}
    restart: unless-stopped
