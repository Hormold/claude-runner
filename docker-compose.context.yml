# Docker Compose template for Claude Runner context containers.
# Used by DockerSessionManager to spawn isolated context environments.
#
# Variables (substituted at runtime):
#   CONTEXT_ID   - unique context identifier
#   CONTEXT_DIR  - absolute host path to contexts/{id}/
#   CPUS         - CPU limit (default: 2)
#   MEMORY       - memory limit (default: 2g)

services:
  context:
    build:
      context: .
      dockerfile: Dockerfile.context
    container_name: "claude-ctx-${CONTEXT_ID}"
    volumes:
      - "${CONTEXT_DIR}:/workspace"
    read_only: true
    tmpfs:
      - /tmp:size=256m
    deploy:
      resources:
        limits:
          cpus: "${CPUS:-2}"
          memory: "${MEMORY:-2g}"
    security_opt:
      - no-new-privileges:true
    network_mode: none
    restart: "no"
